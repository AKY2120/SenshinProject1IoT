<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>環境計測・室温予測モニター</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>部屋を選択してください</h1>

        <!-- ★ ここを修正：action="/" にする -->
        <form action="/" method="POST">
            <select name="room_name" class="room-select" id="room-select">
                {% for r in rooms %}
                    <option value="{{ r }}" {% if r == room_name %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>
        </form>
        
        <header>
            <h1>環境計測・室温予測モニター</h1>
            <p class="room-name">現在の計測部屋：<strong>{{ room_name }}</strong></p>
        </header>

        <section class="current-section">
            <h2>現在の環境データ</h2>

            <div class="card-grid">

                <div class="card">
                    <h3>室温</h3>
                    <p class="value" id="temp">{{ current_room_temp }} ℃</p>
                </div>

                <div class="card">
                    <h3>湿度</h3>
                    <p class="value" id="humid">{{ current_room_humid }} %</p>
                </div>

                <div class="card">
                    <h3>不快指数</h3>
                    <p class="value" id="discomfort">{{ discomfort }}</p>
                </div>

            </div>
        </section>

        <section class="predict-section">
            <h2>AI予測（1日後）</h2>

            <div class="predict-box">
                <p>1日後の予測室温</p>
                <p class="predict-value" id="pred">{{ tomorrow_pred }}</p>
            </div>
        </section>

        <footer>
            <p>© 2026 室温予測システム</p>
        </footer>

        <script>
            function updateData() {
                const room = document.querySelector("select[name='room_name']").value;

                fetch("/api/data", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: "room_name=" + encodeURIComponent(room)
                })
                .then(res => res.json())
                .then(data => {
                    document.querySelector("#temp").textContent = data.temp + " ℃";
                    document.querySelector("#humid").textContent = data.humid + " %";
                    document.querySelector("#discomfort").textContent = data.discomfort;
                    document.querySelector("#pred").textContent = data.pred;
                });
                
            }
            document.querySelector("#room-select").addEventListener("change", updateData);

            // 5秒ごとに更新
            setInterval(updateData, 5000);
        </script>

    </div>
</body>
</html>
