<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>室温・湿度の計測と明日の気温予測</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        
        <header>
            <h1>室温・湿度の計測と明日の気温予測</h1>
            <p class="room-name">現在の計測部屋：<strong id="current-room">{{ room_name }}</strong></p>
        </header>
        
        <h1>部屋を選択</h1>

        <form action="/" method="POST" id="room-form">
            <select name="room_name" class="room-select" id="room-select">
                {% for r in rooms %}
                    <option value="{{ r }}" {% if r == room_name %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>
        </form>

        <section class="current-section">
            <h2>現在の環境データ</h2>

            <div class="card-grid">
                <div class="card">
                    <h3>室温</h3>
                    <p class="value" id="temp">{{ current_room_temp }} ℃</p>
                </div>

                <div class="card">
                    <h3>湿度</h3>
                    <p class="value" id="humid">{{ current_room_humid }} %</p>
                </div>

                <div class="card">
                    <h3>不快指数</h3>
                    <p class="value" id="discomfort">{{ discomfort }}</p>
                </div>
            </div>
        </section>

        <section class="predict-section">
            <h2>AIによる明日の気温予測</h2>

            <div class="predict-box">
                <p>1日後の予測室温</p>
                <p class="predict-value" id="pred">{{ tomorrow_pred }}</p>
            </div>
        </section>

        <footer>
            <p>© 2026 室温予測システム</p>
        </footer>

        <script>
            function updateData() {
                const roomSelect = document.querySelector("#room-select");
                const room = roomSelect.value;

                fetch("/api/data", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: "room_name=" + encodeURIComponent(room)
                })
                .then(res => res.json())
                .then(data => {
                    // データを書き換える
                    document.querySelector("#temp").textContent = data.temp + " ℃";
                    document.querySelector("#humid").textContent = data.humid + " %";
                    document.querySelector("#discomfort").textContent = data.discomfort;
                    document.querySelector("#pred").textContent = data.pred;
                    
                    //「現在の計測部屋」のテキストも、選択された部屋名に書き換える
                    document.querySelector("#current-room").textContent = room;
                })
                .catch(err => console.error("データ取得エラー:", err));
            }

            // 部屋が変更されたら、即座にデータを更新する
            document.querySelector("#room-select").addEventListener("change", updateData);

            // 5秒ごとに自動で最新データ（予測含む）に更新
            setInterval(updateData, 5000);
        </script>

    </div>
</body>
</html>
